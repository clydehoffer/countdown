<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Show Countdown</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            margin: 0;
        }
        .tiles {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .tile {
            background: rgba(0,0,0,.04);
            border: 1px solid rgba(0,0,0,.1);
            border-radius: 10px;
            min-width: 56px;
            padding: 10px 8px;
            text-align: center;
        }
        .tile-num {
            color: #FCB237;
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
        }
        .tile-label {
            color: rgba(0,0,0,.4);
            font-size: 9px;
            letter-spacing: 1.5px;
            margin-top: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="tiles">
        <div class="tile"><div class="tile-num" id="days">--</div><div class="tile-label">Days</div></div>
        <div class="tile"><div class="tile-num" id="hours">--</div><div class="tile-label">Hours</div></div>
        <div class="tile"><div class="tile-num" id="mins">--</div><div class="tile-label">Mins</div></div>
        <div class="tile"><div class="tile-num" id="secs">--</div><div class="tile-label">Secs</div></div>
    </div>
    <script>
        var target = new Date('April 25, 2026 10:00:00').getTime();
        function tick() {
            var diff = Math.max(target - Date.now(), 0);
            document.getElementById('days').textContent  = Math.floor(diff / 86400000);
            document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
            document.getElementById('mins').textContent  = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            document.getElementById('secs').textContent  = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
        }
        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
